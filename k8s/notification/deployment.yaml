apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  namespace: eventstrat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification
  template:
    metadata:
      labels:
        app: notification
    spec:
      containers:
        - name: notification
          image: your-dockerhub-username/notification:latest
          ports:
            - containerPort: 3007
          env:
            - name: NODE_ENV
              value: "production"
---
apiVersion: v1
kind: Service
metadata:
  name: notification
  namespace: eventstrat
spec:
  selector:
    app: notification
  ports:
    - port: 80
      targetPort: 3007
