apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: eventstrat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        - name: client
          image: your-dockerhub-username/client:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: client
  namespace: eventstrat
spec:
  selector:
    app: client
  ports:
    - port: 80
      targetPort: 80
