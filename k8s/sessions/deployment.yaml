apiVersion: apps/v1
kind: Deployment
metadata:
  name: sessions
  namespace: eventstrat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sessions
  template:
    metadata:
      labels:
        app: sessions
    spec:
      containers:
        - name: sessions
          image: your-dockerhub-username/sessions:latest
          ports:
            - containerPort: 3004
          env:
            - name: NODE_ENV
              value: "production"
---
apiVersion: v1
kind: Service
metadata:
  name: sessions
  namespace: eventstrat
spec:
  selector:
    app: sessions
  ports:
    - port: 80
      targetPort: 3004
