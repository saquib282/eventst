apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog
  namespace: eventstrat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: blog
  template:
    metadata:
      labels:
        app: blog
    spec:
      containers:
        - name: blog
          image: your-dockerhub-username/blog:latest
          ports:
            - containerPort: 3006
          env:
            - name: NODE_ENV
              value: "production"
---
apiVersion: v1
kind: Service
metadata:
  name: blog
  namespace: eventstrat
spec:
  selector:
    app: blog
  ports:
    - port: 80
      targetPort: 3006
