apiVersion: apps/v1
kind: Deployment
metadata:
  name: polls
  namespace: eventstrat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: polls
  template:
    metadata:
      labels:
        app: polls
    spec:
      containers:
        - name: polls
          image: your-dockerhub-username/polls:latest
          ports:
            - containerPort: 3005
          env:
            - name: NODE_ENV
              value: "production"
---
apiVersion: v1
kind: Service
metadata:
  name: polls
  namespace: eventstrat
spec:
  selector:
    app: polls
  ports:
    - port: 80
      targetPort: 3005
