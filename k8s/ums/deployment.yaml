apiVersion: apps/v1
kind: Deployment
metadata:
  name: ums
  namespace: eventstrat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ums
  template:
    metadata:
      labels:
        app: ums
    spec:
      containers:
        - name: ums
          image: your-dockerhub-username/ums:latest
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
---
apiVersion: v1
kind: Service
metadata:
  name: ums
  namespace: eventstrat
spec:
  selector:
    app: ums
  ports:
    - port: 80
      targetPort: 3001
